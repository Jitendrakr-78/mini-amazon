<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
    <title>Admin Panel</title>
</head>
<body>
    <header><h2>Admin Panel</h2><a href="index.html">Home</a></header>
    <div class="container">
        <h2>Add New Product</h2>
        <form id="add-product-form">
            <input type="text" id="p-title" placeholder="Product Title" required>
            <textarea id="p-desc" placeholder="Description"></textarea>
            <input type="number" id="p-price" placeholder="Price" required>
            <input type="text" id="p-img" placeholder="Image URL">
            <input type="number" id="p-stock" placeholder="Stock" defaultValue="10">
            <button type="submit">Add Product</button>
        </form>
        <h2>Manage Products</h2>
        <div id="admin-products-list"></div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
